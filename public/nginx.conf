# Nginx configuration for Rivervox SPA
# Copy this server block into your nginx.conf or sites-available config

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    root /var/www/html;  # Update to your dist folder path
    index index.html;

    # Serve static files directly, fallback to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
